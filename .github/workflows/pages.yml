name: Validate landing site

# Validates the static landing site in docs/ on every push that touches it.
#
# Pages is configured to serve natively from the /docs folder on main (Settings
# → Pages → Source: "Deploy from a branch", branch main, folder /docs), so
# GitHub rebuilds and publishes automatically — no Actions deploy step needed.
# This workflow's job is to FAIL THE RUN if the published HTML is missing or
# malformed, so a broken commit is caught in CI before (or right as) it goes
# live, instead of silently shipping a broken page to visitors.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Required pages exist
        run: |
          set -e
          for f in docs/index.html docs/commands.html; do
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty published page: $f"
              exit 1
            fi
          done
          echo "✓ docs/index.html and docs/commands.html present"

      - name: HTML is well-formed
        run: |
          python3 - <<'PY'
          import sys
          from html.parser import HTMLParser
          from pathlib import Path

          class _V(HTMLParser):
              def error(self, message):  # py<3.5 compat noop; parser is lenient
                  raise ValueError(message)

          failed = False
          for path in ("docs/index.html", "docs/commands.html"):
              text = Path(path).read_text(encoding="utf-8")
              # Basic structural sanity: a parseable doc with a closing </html>.
              try:
                  _V(convert_charrefs=True).feed(text)
              except Exception as exc:  # noqa: BLE001
                  print(f"::error::{path} failed to parse: {exc}")
                  failed = True
                  continue
              if "</html>" not in text.lower():
                  print(f"::error::{path} has no closing </html> tag")
                  failed = True
              else:
                  print(f"✓ {path} parses and is structurally complete")
          sys.exit(1 if failed else 0)
          PY

      - name: No unfilled template placeholders
        run: |
          if grep -rnE '\{\{[A-Z_]+\}\}' docs/*.html; then
            echo "::error::unfilled {{PLACEHOLDER}} markers found in published HTML"
            exit 1
          fi
          echo "✓ no template placeholders left in docs/"

      - name: Site version matches the plugin manifest
        run: |
          python3 - <<'PY'
          import json, re, sys
          from pathlib import Path
          manifest = json.loads(Path("plugin/.claude-plugin/plugin.json").read_text())["version"]
          html = Path("docs/index.html").read_text()
          m = re.search(r'data-hedwig-version[^>]*>v?([\d.]+)<', html)
          if not m:
              print("::error::no data-hedwig-version badge found in docs/index.html")
              sys.exit(1)
          shown = m.group(1)
          if shown != manifest:
              print(f"::error::site shows v{shown} but plugin.json is {manifest} — bump the footer badge in docs/index.html")
              sys.exit(1)
          print(f"✓ site version v{shown} matches the plugin manifest")
          PY
